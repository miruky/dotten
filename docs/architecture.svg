<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 452" role="img" aria-labelledby="arch-title">
  <title id="arch-title">dottenの構成図。UI層がgrid・settings・svg・encodeの純粋モジュールを使い、盤面と設定はlocalStorageに保存され、SVG/PNGと共有リンクを書き出す。</title>
  <style>
    .box { fill: #fbfaf8; stroke: #d6d3cb; stroke-width: 1.5; }
    .layer { fill: #f4f3f0; stroke: #d6d3cb; stroke-width: 1.5; }
    .chip { fill: #e1edee; stroke: none; }
    .name { fill: #20232a; font: 600 15px system-ui, sans-serif; }
    .label { fill: #767a82; font: 12.5px system-ui, sans-serif; }
    .chip-text { fill: #246870; font: 600 12.5px system-ui, sans-serif; }
    .layer-name { fill: #246870; font: 700 12px system-ui, sans-serif; letter-spacing: 0.1em; }
    .edge { stroke: #9aa0a8; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    .edge-label { fill: #8a9098; font: 11px system-ui, sans-serif; }
    #arrow path { fill: #9aa0a8; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #1c1f23; stroke: #3b4047; }
      .layer { fill: #15171a; stroke: #3b4047; }
      .chip { fill: #1d3236; }
      .name { fill: #e9e7e2; }
      .label { fill: #898e96; }
      .chip-text { fill: #8ad3da; }
      .layer-name { fill: #8ad3da; }
      .edge { stroke: #767c84; }
      .edge-label { fill: #767c84; }
      #arrow path { fill: #767c84; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z"/>
    </marker>
  </defs>

  <rect class="layer" x="40" y="28" width="840" height="120" rx="14"/>
  <text class="layer-name" x="64" y="55">UI層(app.ts / main.ts)</text>
  <text class="label" x="64" y="77">盤面DOMは作り直さず塗ったマスだけ差し替える。ストローク開始時に取り消しの控えを取る</text>
  <rect class="chip" x="64" y="96" width="168" height="30" rx="15"/>
  <text class="chip-text" x="148" y="116" text-anchor="middle">キャンバス(pointer)</text>
  <rect class="chip" x="244" y="96" width="214" height="30" rx="15"/>
  <text class="chip-text" x="351" y="116" text-anchor="middle">道具・パレット・取り消し</text>
  <rect class="chip" x="470" y="96" width="196" height="30" rx="15"/>
  <text class="chip-text" x="568" y="116" text-anchor="middle">書き出し・共有・テーマ</text>

  <path class="edge" d="M130 148 V196"/>
  <path class="edge" d="M350 148 V196"/>
  <path class="edge" d="M570 148 V196"/>
  <path class="edge" d="M790 148 V196"/>

  <rect class="box" x="40" y="200" width="180" height="96" rx="14"/>
  <text class="name" x="130" y="232" text-anchor="middle">grid.ts</text>
  <text class="label" x="130" y="255" text-anchor="middle">盤面・塗りつぶし</text>
  <text class="label" x="130" y="274" text-anchor="middle">対称・大きさ・永続化</text>

  <rect class="box" x="260" y="200" width="180" height="96" rx="14"/>
  <text class="name" x="350" y="232" text-anchor="middle">settings.ts</text>
  <text class="label" x="350" y="255" text-anchor="middle">道具設定の検証</text>
  <text class="label" x="350" y="274" text-anchor="middle">palette / theme</text>

  <rect class="box" x="480" y="200" width="180" height="96" rx="14"/>
  <text class="name" x="570" y="232" text-anchor="middle">svg.ts</text>
  <text class="label" x="570" y="255" text-anchor="middle">行ラン+矩形結合で</text>
  <text class="label" x="570" y="274" text-anchor="middle">rect数を最小化</text>

  <rect class="box" x="700" y="200" width="180" height="96" rx="14"/>
  <text class="name" x="790" y="232" text-anchor="middle">encode.ts</text>
  <text class="label" x="790" y="255" text-anchor="middle">盤面 ⇄ base64url</text>
  <text class="label" x="790" y="274" text-anchor="middle">共有文字列の符号化</text>

  <path class="edge" d="M120 296 C 120 336, 240 336, 240 372"/>
  <path class="edge" d="M360 296 C 360 336, 250 336, 250 372"/>
  <text class="edge-label" x="300" y="346" text-anchor="middle">保存・復元</text>
  <path class="edge" d="M570 296 V372"/>
  <text class="edge-label" x="582" y="346">コピー・保存</text>
  <path class="edge" d="M790 296 V372"/>
  <text class="edge-label" x="802" y="346">共有</text>

  <rect class="box" x="150" y="376" width="190" height="50" rx="12"/>
  <text class="name" x="245" y="400" text-anchor="middle">localStorage</text>
  <text class="label" x="245" y="416" text-anchor="middle">盤面・設定</text>

  <rect class="box" x="480" y="376" width="180" height="50" rx="12"/>
  <text class="name" x="570" y="406" text-anchor="middle">SVG / PNGファイル</text>

  <rect class="box" x="700" y="376" width="180" height="50" rx="12"/>
  <text class="name" x="790" y="406" text-anchor="middle">共有リンク(URL)</text>
</svg>
