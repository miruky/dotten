<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ピクセルアートエディタ。ブラウザでドット絵を描き、最適化したSVGとして書き出す"
    />
    <meta name="theme-color" content="#f3f2ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15171a" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>dotten | ドット絵エディタ</title>
    <script>
      // 描画前にテーマを確定してFOUCを防ぐ。保存値が無ければ端末の好みに従う。
      (function () {
        try {
          var raw = localStorage.getItem('dotten.settings.v1');
          var choice = raw ? JSON.parse(raw).theme : 'system';
          if (choice !== 'light' && choice !== 'dark') {
            choice = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = choice;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
